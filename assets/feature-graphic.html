<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    .canvas {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #5a32e0 0%, #6f45ff 45%, #8b6aff 100%);
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Decorative circles background */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .c1 { width: 500px; height: 500px; top: -180px; right: -60px; }
    .c2 { width: 320px; height: 320px; bottom: -140px; right: 160px; background: rgba(255,255,255,0.06); }
    .c3 { width: 180px; height: 180px; top: 40px; right: 280px; background: rgba(255,255,255,0.05); }
    .c4 { width: 80px;  height: 80px;  bottom: 60px; left: 340px; background: rgba(255,255,255,0.07); }

    /* Subtle grid lines */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Left content */
    .content {
      position: relative;
      z-index: 10;
      padding-left: 72px;
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      margin-bottom: 22px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: #a8f0b8;
      border-radius: 50%;
      box-shadow: 0 0 6px #a8f0b8;
    }
    .badge span {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .app-name {
      font-size: 72px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .app-name span {
      color: rgba(255,255,255,0.55);
      font-weight: 300;
    }

    .tagline {
      font-size: 21px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      max-width: 420px;
      margin-bottom: 36px;
    }

    .pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.2px;
    }

    /* Right — icon */
    .icon-wrap {
      position: relative;
      z-index: 10;
      padding-right: 80px;
      flex-shrink: 0;
    }

    .icon-glow {
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .icon-shadow {
      position: absolute;
      width: 210px; height: 40px;
      bottom: -24px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
      filter: blur(6px);
    }

    .icon-img {
      width: 200px;
      height: 200px;
      border-radius: 44px;
      display: block;
      position: relative;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.15);
    }

    /* Bottom-right: by Lusha */
    .byline {
      position: absolute;
      bottom: 28px;
      right: 72px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="bg-circle c4"></div>

    <div class="content">
      <div class="badge">
        <div class="badge-dot"></div>
        <span>B2B Intelligence</span>
      </div>

      <div class="app-name">Lusha <span>ToGo</span></div>

      <div class="tagline">
        Find verified emails &amp; direct dials.<br>
        Powered by AI, built for sales.
      </div>

      <div class="pills">
        <div class="pill">AI Search</div>
        <div class="pill">Verified Contacts</div>
        <div class="pill">Smart Lists</div>
      </div>
    </div>

    <div class="icon-wrap">
      <div style="position:relative; display:inline-block;">
        <div class="icon-glow"></div>
        <img class="icon-img" src="icon.png" alt="Lusha ToGo">
        <div class="icon-shadow"></div>
      </div>
    </div>

    <div class="byline">by Lusha</div>
  </div>
</body>
</html>
